<!DOCTYPE html>
<html lang="de">
<head>
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#16a34a">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Kassameister</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --bg-soft:#fbfcff;
      --bg-white:#ffffff;
      --bg-table:#f8fafc;
      --bg-table-alt:#fafbfc;
      --bg-table-hover:#f4f7fb;

      --card:rgba(255,255,255,.94);
      --card-border:rgba(217,224,234,.95);

      --line:#d9e0ea;
      --line-strong:#c7d2e3;
      --line-soft:#e5e7eb;
      --line-hover:#b6c1d3;
      --line-log:#edf2f7;

      --text:#1f2937;
      --muted:#6b7280;
      --white:#ffffff;

      --shadow-xs:rgba(0,0,0,.03);
      --shadow-sm:rgba(15,23,42,.03);
      --shadow-md:rgba(15,23,42,.05);
      --shadow-lg:rgba(15,23,42,.07);
      --shadow-toast-1:rgba(0,0,0,.08);
      --shadow-toast-2:rgba(0,0,0,.05);
      --inset-white:rgba(255,255,255,.7);
      --inset-white-strong:rgba(255,255,255,.85);

      --accent:#16a34a;
      --accent-2:#15803d;
      --accent-soft:#ecfdf5;
      --accent-soft-2:#f0fdf4;
      --accent-bg:#dcfce7;
      --accent-border:#bbf7d0;
      --accent-focus:#86efac;
      --accent-text:#166534;
      --accent-text-strong:#14532d;
      --accent-shadow:rgba(22,163,74,.12);
      --accent-shadow-soft:rgba(22,163,74,.08);
      --accent-focus-shadow:rgba(22,163,74,.10);

      --ok:#16a34a;
      --ok-soft:#ecfdf3;
      --ok-bg:#dcfce7;
      --ok-border:#bbf7d0;
      --ok-text:#166534;

      --warn:#dc2626;
      --warn-soft:#fff5f5;
      --warn-bg:#fef2f2;
      --warn-border:#fecaca;
      --warn-text:#b91c1c;

      --btn-font-size:19px;
      --btn-height:72px;
    }

    :root.theme-purple{
      --accent:#7c3aed;
      --accent-2:#6d28d9;
      --accent-soft:#f3e8ff;
      --accent-soft-2:#faf5ff;
      --accent-bg:#efe7ff;
      --accent-border:#ddd6fe;
      --accent-focus:#c4b5fd;
      --accent-text:#5b21b6;
      --accent-text-strong:#4c1d95;
      --accent-shadow:rgba(124,58,237,.12);
      --accent-shadow-soft:rgba(109,40,217,.08);
      --accent-focus-shadow:rgba(124,58,237,.10);
    }

    :root.theme-green{
      --accent:#16a34a;
      --accent-2:#15803d;
      --accent-soft:#ecfdf5;
      --accent-soft-2:#f0fdf4;
      --accent-bg:#dcfce7;
      --accent-border:#bbf7d0;
      --accent-focus:#86efac;
      --accent-text:#166534;
      --accent-text-strong:#14532d;
      --accent-shadow:rgba(22,163,74,.12);
      --accent-shadow-soft:rgba(22,163,74,.08);
      --accent-focus-shadow:rgba(22,163,74,.10);
    }

    *{
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
      touch-action: manipulation;
    }

    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, var(--bg-white) 0%, var(--bg-table-alt) 22%, var(--bg) 60%),
        var(--bg);
      touch-action: manipulation;
    }

    .wrap{
      margin:0 auto;
      padding:4px 4px 0 4px;
    }

    h1,h2,h3{
      margin:0;
      letter-spacing:-0.02em;
    }

    h1{
      font-size:26px;
      line-height:1.1;
      font-weight:800;
    }

    h2{
      margin-bottom:14px;
      font-size:22px;
      line-height:1.2;
      font-weight:780;
    }

    h3{
      margin-bottom:10px;
      font-size:18px;
      font-weight:720;
    }

    hr{
      border:none;
      border-top:1px solid var(--line-soft);
      margin:16px 0;
    }

    .sub{
      color:var(--muted);
      margin-top:6px;
      font-size:14px;
      line-height:1.5;
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:8px;
      padding:14px;
      border:1px solid var(--line);
      border-radius:20px;
      background:linear-gradient(135deg, var(--card) 0%, var(--bg-table) 100%);
      box-shadow:
        0 1px 2px var(--shadow-sm),
        0 14px 34px var(--shadow-md);
      backdrop-filter:blur(4px);
    }

    .header-title{
      display:flex;
      flex-direction:column;
      gap:1px;
    }

    .navTabs{
      display:flex;
      width:100%;
      gap:8px;
      flex-wrap:wrap;
    }

    .navTabs button{
      flex:1;
      width:100%;
      padding: 4px;
    }

    .view{
      display:none;
    }

    .view.active{
      display:block;
    }

    .grid{
      display:grid;
      gap:12px;
      grid-template-columns:1fr 1fr 0.9fr;
    }

    .card{
      background:var(--card);
      border:1px solid var(--card-border);
      border-radius:18px;
      padding:8px;
      box-shadow:
        0 1px 2px var(--shadow-sm),
        0 10px 30px var(--shadow-md);
      backdrop-filter:blur(6px);
    }

    .card.focus{
      border-color:var(--accent-border);
      box-shadow:
        0 1px 2px var(--shadow-sm),
        0 12px 34px var(--accent-shadow-soft);
    }

    .section{
      margin-bottom:16px;
    }

    .section:last-child{
      margin-bottom:0;
    }

    .subsection{
      margin-bottom:8px;
    }

    .muted{
      color:var(--muted);
    }

    .small{
      font-size:13px;
      color:var(--muted);
      line-height:1.45;
    }

    .tiny{
      font-size:12px;
      color:var(--muted);
      line-height:1.4;
    }

    .inline{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .btnrow{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .tilegrid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(160px, 1fr));
      gap:4px;
    }

    #menuButtonsDrinks{
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .sizegrid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
    }

    button{
      border:1px solid var(--line);
      background:var(--bg-white);
      color:var(--text);
      border-radius:14px;
      padding:12px 14px;
      cursor:pointer;
      font-size:16px;
      font-weight:650;
      font-family:inherit;
      transition:
        transform .08s ease,
        box-shadow .16s ease,
        border-color .16s ease,
        background-color .16s ease,
        color .16s ease;
      box-shadow:0 1px 2px var(--shadow-xs);

      user-select:none;
      -webkit-user-select:none;
      -webkit-touch-callout:none;
      touch-action: manipulation;
    }

    button:hover{
      border-color:var(--line-hover);
      box-shadow:0 6px 16px var(--shadow-lg);
    }

    button:active{
      transform:translateY(1px) scale(.99);
    }

    button:disabled{
      opacity:.55;
      cursor:not-allowed;
      box-shadow:none;
    }

    button.primary{
      background:linear-gradient(180deg, var(--accent) 0%, var(--accent-2) 100%);
      color:var(--white);
      border-color:transparent;
    }

    button.primary:hover{
      filter:brightness(1.02);
    }

    button.secondary{
      background:linear-gradient(180deg, var(--accent-soft-2) 0%, var(--accent-soft) 100%);
      border-color:var(--accent-border);
      color:var(--accent-text);
    }

    button.danger{
      background:linear-gradient(180deg, var(--warn-soft) 0%, var(--warn-bg) 100%);
      border-color:var(--warn-border);
      color:var(--warn-text);
    }

    button.selected{
      outline:none;
      border-color:var(--accent);
      background:linear-gradient(180deg, var(--accent-soft-2) 0%, var(--accent-bg) 100%);
      box-shadow:
        0 0 0 3px var(--accent-shadow),
        inset 0 1px 0 var(--inset-white);
    }
    
    button.big{
      font-size:var(--btn-font-size);
      min-height:var(--btn-height);
    }

    button.items{
      border-radius:8px;
      padding:6px 7px;
      font-size:16px;
      font-weight:400;
    }

    .size-btn{
      font-size:22px !important;
      font-weight:800;
      position:relative;
      overflow:hidden;
    }

    .size-btn:active{
      transform:scale(.96);
      filter:brightness(.92);
      box-shadow:
        0 0 0 4px var(--accent-shadow),
        inset 0 3px 8px rgba(0,0,0,.16);
    }

    .size-btn.pressed{
      animation:sizeButtonPress .22s ease;
    }

    @keyframes sizeButtonPress{
      0%{
        transform:scale(1);
      }
      45%{
        transform:scale(.92);
        filter:brightness(.9);
        box-shadow:
          0 0 0 5px var(--accent-shadow),
          inset 0 4px 10px rgba(0,0,0,.18);
      }
      100%{
        transform:scale(1);
      }
    }

    #undoBtn{
      font-size:14px;
      padding:8px 12px;
      width: 100%;
    }

    .size-btn{
      font-size:22px !important;
      font-weight:800;
    }

    label{
      display:block;
      margin-bottom:4px;
      font-weight:760;
      font-size:15px;
    }

    input[type="text"],
    textarea,
    input[type="range"]{
      font-family:inherit;
    }

    input[type="text"],
    textarea{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px 12px;
      font-size:15px;
      background:var(--bg-white);
      color:var(--text);
      transition:border-color .15s ease, box-shadow .15s ease;
    }

    input[type="text"]:focus,
    textarea:focus{
      outline:none;
      border-color:var(--accent-focus);
      box-shadow:0 0 0 3px var(--accent-focus-shadow);
    }

    textarea{
      min-height:90px;
      resize:vertical;
    }

    select{
      font-family:inherit;
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px 12px;
      font-size:15px;
      background:var(--bg-white);
      color:var(--text);
    }

    select:focus{
      outline:none;
      border-color:var(--accent-focus);
      box-shadow:0 0 0 3px var(--accent-focus-shadow);
    }

    .selection-card{
      border:1px solid var(--accent-border);
      background:linear-gradient(180deg, var(--accent-soft-2) 0%, var(--accent-soft) 100%);
      border-radius:14px;
      padding:14px;
      margin-bottom:12px;
      box-shadow:inset 0 1px 0 var(--inset-white-strong);
    }

    .selection-title{
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:var(--accent-text);
      margin-bottom:6px;
      font-weight:700;
    }

    .selection-value{
      font-size:15px;
      font-weight:800;
      line-height:1.25;
    }

    .summary{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
    }

    .stat{
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px;
      background:linear-gradient(180deg, var(--bg-white) 0%, var(--bg-table) 100%);
      box-shadow:0 4px 14px var(--shadow-sm);
    }

    .stat .n{
      font-size:34px;
      font-weight:820;
      line-height:1;
      margin-top:8px;
      letter-spacing:-0.02em;
    }

    .log{
      max-height:200px;
      overflow:auto;
      border:1px solid var(--line);
      border-radius:14px;
      padding:5px;
      background:linear-gradient(180deg, var(--bg-soft) 0%, var(--bg-table) 100%);
    }

    .logitem{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:4px;
      padding:4px 4px;
      border-bottom:1px solid var(--line-log);
      font-size:13px;
    }

    .logitem:last-child{
      border-bottom:none;
    }

    .ok{
      color:var(--ok);
      font-weight:700;
    }

    .scrollFollow{
      position:sticky;
      top:8px;
    }

    .tablewrap{
      overflow:auto;
      max-height:700px;
      border:1px solid var(--line);
      border-radius:16px;
      background:var(--bg-white);
      box-shadow:inset 0 1px 0 var(--inset-white-strong);
    }

    table{
      width:100%;
      border-collapse:collapse;
      font-size:14px;
    }

    th,td{
      border:1px solid var(--line);
      padding:10px 12px;
      text-align:center;
      white-space:nowrap;
    }

    th{
      background:var(--bg-table);
      position:sticky;
      top:0;
      z-index:2;
      font-weight:760;
    }

    td:first-child,
    th:first-child{
      text-align:left;
      position:sticky;
      left:0;
      background:var(--bg-table);
      z-index:1;
    }

    tbody tr:nth-child(even){
      background:var(--bg-table-alt);
    }

    tbody tr:hover{
      background:var(--bg-table-hover);
    }

    tbody tr:last-child{
      background:var(--accent-soft);
      font-weight:800;
    }

    .settings{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
    }

    .settings-card{
      background:linear-gradient(180deg, var(--bg-white) 0%, var(--bg-table) 100%);
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px;
      box-shadow:0 4px 14px var(--shadow-sm);
    }

    .settings-actions{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-top:16px;
    }

    .settings-preview{
      display:flex;
      gap:20px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
      padding:14px;
      margin-bottom:18px;
      border:1px solid var(--line);
      border-radius:16px;
      background:linear-gradient(180deg, var(--bg-white) 0%, var(--bg-table) 100%);
    }

    .slider-group{
      display:grid;
      gap:12px;
      min-width:180px;
      flex:1;
    }

    .slider-row{
      display:flex;
      align-items:flex-start;
      gap:12px;
      flex-wrap:wrap;
    }

    .slider-row label{
      min-width:auto;
      margin:0;
      width:100%;
    }

    .slider-row input[type="range"]{
      flex: 1;
      min-width:180px;
      accent-color:var(--accent);
    }

    .slider-value{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:64px;
      padding:6px 10px;
      border-radius:999px;
      background:var(--accent-soft);
      border:1px solid var(--accent-border);
      color:var(--accent-text);
      font-weight:700;
      font-size:13px;
    }

    .footer{
      margin:12px 16px 12px;
      margin-bottom:72px;
      font-size:12px;
      color:var(--muted);
      opacity:.82;
    }

    .toast{
      position:fixed;
      right:16px;
      bottom:16px;
      background:linear-gradient(180deg, var(--ok-soft) 0%, var(--ok-bg) 100%);
      color:var(--ok-text);
      border:1px solid var(--ok-border);
      padding:12px 16px;
      border-radius:14px;
      box-shadow:
        0 8px 24px var(--shadow-toast-1),
        0 2px 6px var(--shadow-toast-2);
      font-size:14px;
      font-weight:700;
      opacity:0;
      transform:translateY(20px) scale(.98);
      transition:all .2s ease;
      z-index:9999;
      pointer-events:none;
      max-width:min(90vw, 420px);
    }

    .toast.show{
      opacity:1;
      transform:translateY(0) scale(1);
    }
  </style>
</head>

    function loadArray(key, fallback){
      try{
        const raw = localStorage.getItem(key);
        if(!raw) return [...fallback];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [...fallback];
      }catch{
        return [...fallback];
      }
    }

      localStorage.setItem(STORAGE_KEYS.orders, JSON.stringify(state.orders));

      return String(str)

        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")

        .replaceAll("'","&#039;");

    let toastTimeout;
    function showToast(message, type = "success"){
      const toast = document.getElementById("toast");

      clearTimeout(toastTimeout);
      toast.textContent = message;
      toast.className = "toast " + type;

      requestAnimationFrame(() => {
        toast.classList.add("show");
      });

      toastTimeout = setTimeout(() => {
        toast.classList.remove("show");
      }, 2000);
    }

    function getLocalTimestamp(isoDateTimeStr = null){
      let dt;
      if (isoDateTimeStr === null) {
        dt = new Date();
      } else {
        dt = new Date(isoDateTimeStr);
      }
      const time = isNaN(dt)
        ? ""
        : dt.toLocaleTimeString("de-AT", {hour:"2-digit", minute:"2-digit", second:"2-digit"});
      return time;
    }

    function renderOrderLog(){
      const log = document.getElementById("log");

      if(state.orders.length === 0){
        log.innerHTML = '<div class="muted" style="padding:8px;">Noch keine Einträge vorhanden.</div>';
        return;
      }

      log.innerHTML = "";
      const uniqueTables = state.orders.reduce((set, entry) => set.add(entry.table), new Set());
      for (let i = 0; i < uniqueTables.size; i++) {
        const currentTable = state.orders.filter(entry => entry.table === i + 1);

        const tableTotal = currentTable.reduce((sum, entry) => sum + entry.price, 0).toFixed(2);
        log.innerHTML += `<div style="display: flex; justify-content: space-between;"><span class="">Tisch ${i + 1}</span><button class="primary">€ ${tableTotal}</button></div>`;

        const uniquePersons = currentTable.reduce((set, entry) => set.add(entry.person), new Set());

        uniquePersons.forEach(person => {
          tablePersonOrders = state.orders.filter(entry => entry.table === i + 1 && entry.person === person);

          console.log(tablePersonOrders);

          log.innerHTML += `<div><span class="">${person}</span><span>€ ${tablePersonOrders.reduce((sum, entry) => sum + entry.price, 0).toFixed(2)}</span></div>`;


          tablePersonOrders.forEach(entry => {
            log.innerHTML += `
              <div class="logitem" style="margin-left:24px;">
                <div><strong>${escapeHtml(entry.itemName)}</strong></div>
                <div class="">€ ${entry.price.toFixed(2)}</div>
              </div>
            `;
          });
        });

      }
    }

    function showView(viewName){
      document.querySelectorAll(".view").forEach(view => {
        view.classList.remove("active");
      });

      const target = document.getElementById("view-" + viewName);
      if(target){
        target.classList.add("active");
      }

      document.querySelectorAll(".navBtn").forEach(btn => {
        btn.classList.remove("primary", "secondary", "active");
        if(btn.dataset.view === viewName){
          btn.classList.add("primary", "active");
        } else {
          btn.classList.add("secondary");
        }
      });
    }

    document.querySelectorAll(".navBtn").forEach(btn => {
